<h2>Descripción</h2>
<p>
El romero (<em>Rosmarinus officinalis</em>) es un arbusto perenne aromático característico del ecosistema mediterráneo, ampliamente distribuido en zonas secas, soleadas y de suelos pobres o calizos.
</p>

<li>Tipo: Arbusto perenne</li>
<li>Altura: 0,5 – 1,5 metros</li>
<li>Hojas: Aromáticas y persistentes</li>
<li>Floración: Azul o violeta</li>
</ul>
